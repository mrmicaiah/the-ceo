name = "the-ceo"
main = "src/index.ts"
compatibility_date = "2024-12-18"

# Static frontend (built /web → web/dist). The Worker handles /api/* and
# /health; everything else falls through to ASSETS.fetch() at the end of the
# fetch handler. not_found_handling = "single-page-application" returns
# index.html for deep links so client-side routing works.
[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "the-ceo-db"
database_id = "4e2918b0-6ac0-4a1e-b865-0aa7962d2e8e"

# Durable Objects
[durable_objects]
bindings = [
  { name = "CEO_DO", class_name = "CeoDO" },
  { name = "PROJECT_DO", class_name = "ProjectDO" },
  { name = "EMPLOYEE_DO", class_name = "EmployeeDO" },
  { name = "AGENT_HUB_DO", class_name = "AgentHubDO" },
]

# Migrations for Durable Object storage
[[migrations]]
tag = "v1"
new_classes = ["CeoDO", "ProjectDO", "EmployeeDO"]

[[migrations]]
tag = "v2"
new_classes = ["AgentHubDO"]
