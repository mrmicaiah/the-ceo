name = "the-ceo"
main = "src/index.ts"
compatibility_date = "2024-12-18"

# Static frontend (built /web → web/dist). The Worker handles /api/* and
# /health; everything else falls through to ASSETS.fetch() at the end of the
# fetch handler. not_found_handling = "single-page-application" returns
# index.html for deep links so client-side routing works.
[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "the-ceo-db"
database_id = "4e2918b0-6ac0-4a1e-b865-0aa7962d2e8e"

# Durable Objects (v2)
#   PROJECT_DO     — per-project metadata (briefings)
#   MANAGER_DO     — per-project manager chat (renamed from v1's EmployeeDO)
#   AGENT_HUB_DO   — single instance, owns the agent websocket
[durable_objects]
bindings = [
  { name = "PROJECT_DO", class_name = "ProjectDO" },
  { name = "MANAGER_DO", class_name = "ManagerDO" },
  { name = "AGENT_HUB_DO", class_name = "AgentHubDO" },
]

# Migrations for Durable Object storage
[[migrations]]
tag = "v1"
new_classes = ["CeoDO", "ProjectDO", "EmployeeDO"]

[[migrations]]
tag = "v2"
new_classes = ["AgentHubDO"]

# v2-rebuild migration (run #9): the CEO surface is retired, and the
# per-employee DO becomes per-project as ManagerDO.
[[migrations]]
tag = "v3-v2-rebuild"
deleted_classes = ["CeoDO"]
renamed_classes = [
  { from = "EmployeeDO", to = "ManagerDO" },
]
